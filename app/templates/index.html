<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot PID Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <form class="form" id="pid-form">
            <div class="title-block">
                <p class="eyebrow">Sistema de ajuste</p>
                <h1>Robot <span>PID Control</span></h1>
            </div>

            <div class="form-image">
                <img src="{{ url_for('static', filename='img/robot-model3.png') }}" alt="Robot">
            </div>

            <div class="field">
                <label for="joint">Articulación</label>
                <select id="joint" name="joint">
                    <option value="B">Base</option>
                    <option value="S">Shoulder</option>
                    <option value="E">Elbow</option>
                    <option value="W">Wrist</option>
                    <option value="ALL" selected>Global</option>
                </select>
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label for="kp">Kp</label>
                    <span id="kp-value" class="slider-value">0.10</span>
                </div>
                <input type="range" id="kp" name="kp" min="0" max="1" step="0.01" value="0.10">
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label for="ki">Ki</label>
                    <span id="ki-value" class="slider-value">0.00</span>
                </div>
                <input type="range" id="ki" name="ki" min="0" max="1" step="0.01" value="0.00">
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label for="kd">Kd</label>
                    <span id="kd-value" class="slider-value">0.00</span>
                </div>
                <input type="range" id="kd" name="kd" min="0" max="1" step="0.01" value="0.00">
            </div>

            <button type="submit">Enviar PID</button>
        </form>

        <div class="information">
            <div class="status-box">
                <div class="status-top">
                    <h2>Estado actual</h2>
                    <div class="status-badge">En línea</div>
                </div>

                <div id="status-message" class="status-summary">
                    <p>Aún no se han enviado valores.</p>
                </div>

                <table class="status-table">
                    <thead>
                        <tr>
                            <th>Articulación</th>
                            <th>Kp</th>
                            <th>Ki</th>
                            <th>Kd</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Base</td>
                            <td id="kp-B">0.10</td>
                            <td id="ki-B">0.00</td>
                            <td id="kd-B">0.00</td>
                        </tr>
                        <tr>
                            <td>Shoulder</td>
                            <td id="kp-S">0.10</td>
                            <td id="ki-S">0.00</td>
                            <td id="kd-S">0.00</td>
                        </tr>
                        <tr>
                            <td>Elbow</td>
                            <td id="kp-E">0.10</td>
                            <td id="ki-E">0.00</td>
                            <td id="kd-E">0.00</td>
                        </tr>
                        <tr>
                            <td>Wrist</td>
                            <td id="kp-W">0.10</td>
                            <td id="ki-W">0.00</td>
                            <td id="kd-W">0.00</td>
                        </tr>
                    </tbody>
                </table>

                <div id="arduino-confirmation" class="confirmation-box"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
